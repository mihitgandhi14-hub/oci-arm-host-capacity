name: Create OCI ARM Instance

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, zip, openssl

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Write .env file
        run: |
          cat > .env << 'EOF'
          OCI_REGION=ap-mumbai-1
          OCI_USER_ID=ocid1.user.oc1..aaaaaaaao3a6x3mrjvr3h6z3b5xierfcc6ipmt5iqyjveklofuz2euba7yoq
          OCI_TENANCY_ID=ocid1.tenancy.oc1..aaaaaaaawj5mos6i7pfgbxipfl32ed6ncv2eblbewlom2qqmf5opfrlvkgfq
          OCI_KEY_FINGERPRINT=0d:e8:40:cd:48:cd:08:66:43:9e:a2:5d:62:c1:36:5b
          OCI_PRIVATE_KEY_FILENAME=oci_api_key.pem
          OCI_AVAILABILITY_DOMAIN=mNVT:AP-MUMBAI-1-AD-1
          OCI_SUBNET_ID=ocid1.subnet.oc1.ap-mumbai-1.aaaaaaaafvvi7ih6kktzfqmliw7hj5sjkr3d2chcfbiso3eygizpdkrn2ifa
          OCI_IMAGE_ID=ocid1.image.oc1.ap-mumbai-1.aaaaaaaa3yc7aswdetryjk6knfe5zlex6opdvab5oazebaebst5zri3ocxcq
          OCI_OCPUS=4
          OCI_MEMORY_IN_GBS=24
          OCI_SHAPE=VM.Standard.A1.Flex
          OCI_MAX_INSTANCES=1
          OCI_SSH_PUBLIC_KEY="ssh-rsa "
          CACHE_AVAILABILITY_DOMAINS=1
          TOO_MANY_REQUESTS_TIME_WAIT=600
          EOF

      - name: Write private key file
        run: echo "$OCI_PRIVATE_KEY" > oci_api_key.pem
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}

      - name: Run instance creation script
        run: php index.php
